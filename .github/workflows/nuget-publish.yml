# ════════════════════════════════════════════════════════════════════════════
# nuget-publish.yml
#
# Per-package tagging strategy (strategy B).
#
# Tag format:  {PackageName}/v{version}
# Examples:
#   AStar.Dev.Utilities/v1.6.3
#   AStar.Dev.SomeNewPackage/v1.0.0
#   AStar.Dev.AnotherPackage/v2.1.0-beta.1
#
# Each package has its own independent tag namespace. A new package starting
# at v1.0.0 can be tagged without any conflict with other packages at higher
# versions. Packages are never accidentally co-released.
#
# How versioning works:
#   Version comes from Nerdbank.GitVersioning (version.json + git height).
#   The tag is the trigger and the release label — NOT the version source.
#   The workflow extracts the package name from the tag, locates the project,
#   and packs only that project.
#
# Release process:
#   git tag AStar.Dev.Utilities/v1.6.3
#   git push origin AStar.Dev.Utilities/v1.6.3
# ════════════════════════════════════════════════════════════════════════════

name: Publish NuGet package

on:
  push:
    tags:
      # Matches: AStar.Dev.Utilities/v1.6.3
      #          AStar.Dev.SomePackage/v1.0.0-beta.1
      - '*/v[0-9]+.[0-9]+.[0-9]+'
      - '*/v[0-9]+.[0-9]+.[0-9]+-*'

# ── Permissions ───────────────────────────────────────────────────────────────
permissions:
  contents: write   # Create GitHub Release
  packages: write   # Push .nupkg to GitHub Packages
  checks: write     # Publish test results

# ── Environment variables ─────────────────────────────────────────────────────
env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_XMLDOC_MODE: skip
  NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  validate-and-publish:
    name: Build, test & publish
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0    # Full history required for Nerdbank.GitVersioning

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4.3.1
        with:
          global-json-file: global.json

      # ── Derive package name and version from the tag ───────────────────────
      # Tag format: {PackageName}/v{version}
      # e.g. AStar.Dev.Utilities/v1.6.3
      #
      # PACKAGE_NAME    → AStar.Dev.Utilities
      # PACKAGE_VERSION → 1.6.3 (leading 'v' stripped — NuGet doesn't use it)
      - name: Extract package name and version from tag
        id: tag
        run: |
          RAW_TAG="${{ github.ref_name }}"
          PACKAGE_NAME="${RAW_TAG%/v*}"
          RAW_VERSION="${RAW_TAG##*/v}"
          echo "PACKAGE_NAME=${PACKAGE_NAME}"   >> $GITHUB_ENV
          echo "PACKAGE_VERSION=${RAW_VERSION}" >> $GITHUB_ENV
          echo "package_name=${PACKAGE_NAME}"   >> $GITHUB_OUTPUT
          echo "version=${RAW_VERSION}"         >> $GITHUB_OUTPUT
          echo "prerelease=${{ contains(github.ref_name, '-') }}" >> $GITHUB_OUTPUT
          echo "Tagged package : ${PACKAGE_NAME}"
          echo "Tagged version : ${RAW_VERSION}"

      # ── Locate the project file ────────────────────────────────────────────
      # Searches packages/ for a .csproj matching the package name.
      # Fails fast with a clear error if not found.
      - name: Locate project
        id: project
        run: |
          CSPROJ=$(find packages/ -name "${{ env.PACKAGE_NAME }}.csproj" | head -1)
          if [ -z "$CSPROJ" ]; then
            echo "ERROR: Could not find ${{ env.PACKAGE_NAME }}.csproj under packages/"
            exit 1
          fi
          PROJECT_DIR=$(dirname "$CSPROJ")
          echo "CSPROJ=${CSPROJ}"           >> $GITHUB_ENV
          echo "PROJECT_DIR=${PROJECT_DIR}" >> $GITHUB_ENV
          echo "csproj=${CSPROJ}"           >> $GITHUB_OUTPUT
          echo "project_dir=${PROJECT_DIR}" >> $GITHUB_OUTPUT
          echo "Found project : ${CSPROJ}"

      - name: Cache NuGet packages
        uses: actions/cache@v4.2.3
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore

      # ── Build the specific package only ───────────────────────────────────
      # Version comes from Nerdbank.GitVersioning — do NOT pass -p:Version.
      # nbgv reads version.json + git history to stamp the correct version.
      - name: Build
        run: |
          dotnet build "${{ env.CSPROJ }}" \
            --no-restore \
            --configuration Release \
            -p:TreatWarningsAsErrors=true

      # ── Find and run the matching test project ─────────────────────────────
      # Looks for a sibling *.Tests.Unit project next to the package.
      # Skips gracefully if no test project exists.
      - name: Test
        run: |
          TEST_PROJ=$(find packages/ -name "${{ env.PACKAGE_NAME }}.Tests.Unit.csproj" | head -1)
          if [ -z "$TEST_PROJ" ]; then
            echo "WARNING: No test project found for ${{ env.PACKAGE_NAME }} — skipping"
          else
            echo "Running tests: ${TEST_PROJ}"
            dotnet test "${TEST_PROJ}" \
              --no-build \
              --configuration Release \
              --logger "trx;LogFileName=results.trx" \
              --results-directory ./TestResults
          fi

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: TestResults/**/*.trx
          check_name: ${{ env.PACKAGE_NAME }} — test results
          fail_on: test failures

      # ── Pack the specific package only ────────────────────────────────────
      - name: Pack
        run: |
          dotnet pack "${{ env.CSPROJ }}" \
            --no-build \
            --configuration Release \
            --output ./nupkgs

      - name: List packages
        run: ls -la ./nupkgs/

      # ── Push to GitHub Packages ───────────────────────────────────────────
      - name: Push to GitHub Packages
        run: |
          dotnet nuget push "./nupkgs/*.nupkg" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --skip-duplicate

      - name: Push to NuGet.org
        run: |
          dotnet nuget push "./nupkgs/*.nupkg" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate

      # ── Create a GitHub Release ───────────────────────────────────────────
      # Release name includes the package name so the releases page is
      # scannable when multiple packages have been released.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.PACKAGE_NAME }} v${{ env.PACKAGE_VERSION }}
          draft: false
          prerelease: ${{ steps.tag.outputs.prerelease }}
          generate_release_notes: true
          files: |
            ./nupkgs/*.nupkg
            ./nupkgs/*.snupkg

# ════════════════════════════════════════════════════════════════════════════
# nuget-publish.yml
#
# Triggered by a per-package version tag. The tag IS the version — no
# version files to edit, no tools to run. Just tag and push.
#
# Tag format:  {PackageName}/v{version}
# Examples:
#   AStar.Dev.Utilities/v1.6.6
#   AStar.Dev.Utilities/v1.7.0
#   AStar.Dev.SomeNewPackage/v1.0.0
#   AStar.Dev.AnotherPackage/v2.1.0-beta.1
#
# Release workflow — always the same regardless of major/minor/patch:
#
#   git tag AStar.Dev.Utilities/v1.7.0
#   git push origin AStar.Dev.Utilities/v1.7.0
#
# That's it. The pipeline does everything else.
# ════════════════════════════════════════════════════════════════════════════

name: Publish NuGet package

on:
  push:
    tags:
      - '*/v[0-9]+.[0-9]+.[0-9]+'
      - '*/v[0-9]+.[0-9]+.[0-9]+-*'

# ── Permissions ───────────────────────────────────────────────────────────────
permissions:
  contents: write   # Create GitHub Release
  packages: write   # Push .nupkg to GitHub Packages
  checks: write     # Publish test results

# ── Environment variables ─────────────────────────────────────────────────────
env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_XMLDOC_MODE: skip
  NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  validate-and-publish:
    name: Build, test & publish
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4.3.1
        with:
          global-json-file: global.json

      # ── Derive package name and version from the tag ───────────────────────
      # Tag:            AStar.Dev.Utilities/v1.7.0
      # PACKAGE_NAME  → AStar.Dev.Utilities
      # PACKAGE_VERSION → 1.7.0  (leading 'v' stripped)
      # IS_PRERELEASE → true if version contains a hyphen
      - name: Extract package name and version from tag
        id: tag
        run: |
          RAW_TAG="${{ github.ref_name }}"
          PACKAGE_NAME="${RAW_TAG%/v*}"
          PACKAGE_VERSION="${RAW_TAG##*/v}"
          IS_PRERELEASE=false
          if [[ "$PACKAGE_VERSION" == *"-"* ]]; then
            IS_PRERELEASE=true
          fi
          echo "PACKAGE_NAME=${PACKAGE_NAME}"       >> $GITHUB_ENV
          echo "PACKAGE_VERSION=${PACKAGE_VERSION}" >> $GITHUB_ENV
          echo "package_name=${PACKAGE_NAME}"       >> $GITHUB_OUTPUT
          echo "version=${PACKAGE_VERSION}"         >> $GITHUB_OUTPUT
          echo "prerelease=${IS_PRERELEASE}"        >> $GITHUB_OUTPUT
          echo "Package : ${PACKAGE_NAME}"
          echo "Version : ${PACKAGE_VERSION}"
          echo "Pre-release : ${IS_PRERELEASE}"

      # ── Locate the .csproj for the tagged package ──────────────────────────
      # Fails fast with a clear error if the project cannot be found.
      - name: Locate project
        id: project
        run: |
          CSPROJ=$(find packages/ -name "${{ env.PACKAGE_NAME }}.csproj" | head -1)
          if [ -z "$CSPROJ" ]; then
            echo "ERROR: Could not find ${{ env.PACKAGE_NAME }}.csproj under packages/"
            exit 1
          fi
          echo "CSPROJ=${CSPROJ}" >> $GITHUB_ENV
          echo "csproj=${CSPROJ}" >> $GITHUB_OUTPUT
          echo "Found : ${CSPROJ}"

      - name: Cache NuGet packages
        uses: actions/cache@v4.2.3
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore

      # ── Build — version stamped directly from the tag ─────────────────────
      - name: Build
        run: |
          dotnet build "${{ env.CSPROJ }}" \
            --no-restore \
            --configuration Release \
            -p:Version=${{ env.PACKAGE_VERSION }} \
            -p:TreatWarningsAsErrors=true

      # ── Test — finds the matching .Tests.Unit project automatically ────────
      - name: Test
        run: |
          TEST_PROJ=$(find packages/ \
            -name "${{ env.PACKAGE_NAME }}.Tests.Unit.csproj" | head -1)
          if [ -z "$TEST_PROJ" ]; then
            echo "No test project found for ${{ env.PACKAGE_NAME }} — skipping"
          else
            echo "Running tests: ${TEST_PROJ}"
            dotnet test "${TEST_PROJ}" \
              --configuration Release \
              --logger "trx;LogFileName=results.trx" \
              --results-directory ./TestResults
          fi

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: TestResults/**/*.trx
          check_name: ${{ env.PACKAGE_NAME }} — test results
          fail_on: test failures

      # ── Pack — version comes from the tag, not from version.json ──────────
      - name: Pack
        run: |
          dotnet pack "${{ env.CSPROJ }}" \
            --no-build \
            --configuration Release \
            -p:Version=${{ env.PACKAGE_VERSION }} \
            --output ./nupkgs

      - name: List packages
        run: ls -la ./nupkgs/

      # ── Push to GitHub Packages ───────────────────────────────────────────
      - name: Push to GitHub Packages
        run: |
          dotnet nuget push "./nupkgs/*.nupkg" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --skip-duplicate

      - name: Push to NuGet.org
        run: |
          dotnet nuget push "./nupkgs/*.nupkg" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate

      # ── Create GitHub Release with .nupkg assets attached ─────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.PACKAGE_NAME }} v${{ env.PACKAGE_VERSION }}
          draft: false
          prerelease: ${{ steps.tag.outputs.prerelease }}
          generate_release_notes: true
          files: |
            ./nupkgs/*.nupkg
            ./nupkgs/*.snupkg

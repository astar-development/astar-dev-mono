# ════════════════════════════════════════════════════════════════════════════
# fab4kids-tr.yml
# Builds the fab4kids-tr React/Vite SPA and deploys to Azure Web App fab4kids-tr.
# ════════════════════════════════════════════════════════════════════════════

name: fab4kids-tr

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/fab4kids-tr/**'
      - '.github/workflows/fab4kids-tr.yml'
  workflow_dispatch:

concurrency:
  group: fab4kids-tr-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24.x'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/web/fab4kids-tr

    steps:

      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/fab4kids-tr/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: fab4kids-tr-dist
          path: apps/web/fab4kids-tr/dist
          retention-days: 7

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: fab4kids-tr-dist
          path: deploy

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: fab4kids-tr
          slot-name: Production
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_FAB4KIDS_TR }}
          package: deploy

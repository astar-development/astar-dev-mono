# ════════════════════════════════════════════════════════════════════════════
# vue-mutation.yml
# Manual trigger only. Runs Stryker mutation testing against the Vue client.
# ════════════════════════════════════════════════════════════════════════════

name: Vue Mutation Testing

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vue-mutation-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.x'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  mutation:
    name: Stryker mutation tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web/astar-dev-vue

    steps:

      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/astar-dev-vue/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run Stryker (client)
        run: npx stryker run --workspace=client

      - name: Upload mutation report
        uses: actions/upload-artifact@v4.6.2
        with:
          name: mutation-report
          path: apps/web/astar-dev-vue/client/reports/mutation
          retention-days: 7

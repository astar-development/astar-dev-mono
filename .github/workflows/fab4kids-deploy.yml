name: Build and deploy to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/fab4kids/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/web/fab4kids

      - name: Build
        run: npm run build
        working-directory: apps/web/fab4kids

      - name: Prune dev dependencies
        run: npm prune --omit=dev
        working-directory: apps/web/fab4kids

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: fab4kids-site
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_30A7893EAF2D4593B54B7ACFE4926151 }}
          package: apps/web/fab4kids

# ════════════════════════════════════════════════════════════════════════════
# dotnet-ci.yml
# Triggers on any push or PR that touches .NET source, packages, or tests.
# Builds the entire solution and runs all test projects.
# ════════════════════════════════════════════════════════════════════════════

name: .NET CI

on:
  push:
    branches:
      - main
      - 'release/**'
    paths:
      # Any C# source, project, or solution file
      - 'apps/**/*.cs'
      - 'apps/**/*.csproj'
      - 'apps/**/*.axaml'        # Avalonia XAML
      - 'apps/**/*.razor'        # Blazor components
      - 'packages/**/*.cs'
      - 'packages/**/*.csproj'
      - 'tests/**/*.cs'
      - 'tests/**/*.csproj'
      # Root MSBuild / NuGet config — changing these affects everything
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'Directory.Packages.props'
      - 'global.json'
      - 'NuGet.Config'
      - '*.slnx'
      # This workflow file itself
      - '.github/workflows/dotnet-ci.yml'

  pull_request:
    branches:
      - main
      - 'release/**'
    paths:
      - 'apps/**/*.cs'
      - 'apps/**/*.csproj'
      - 'apps/**/*.axaml'
      - 'apps/**/*.razor'
      - 'packages/**/*.cs'
      - 'packages/**/*.csproj'
      - 'tests/**/*.cs'
      - 'tests/**/*.csproj'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'Directory.Packages.props'
      - 'global.json'
      - 'NuGet.Config'
      - '*.slnx'
      - '.github/workflows/dotnet-ci.yml'

# Least-privilege permissions — only grant what each job actually needs.
# This overrides the repo-level default (which is often too broad).
permissions:
  contents: read          # Checkout the repo
  checks: write           # Publish test results via dorny/test-reporter
  pull-requests: write    # Allow test-reporter to annotate PRs with failures

# Cancel any in-progress run for the same branch/PR when a new push arrives.
# Saves CI minutes and keeps the queue clean.
concurrency:
  group: dotnet-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true                  # Suppress the SDK banner in logs
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_XMLDOC_MODE: skip              # Faster restore — skips XML doc download
  NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-and-test:
    name: Build & test
    # Avalonia desktop apps require a display server on Linux CI.
    # ubuntu-latest with xvfb handles this cleanly and is the fastest/cheapest runner.
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4.3.1
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4.2.3
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-
          lookup-only: true

      - name: Restore
        run: dotnet restore

      - name: Build
        run: |
          dotnet build \
            --no-restore \
            --configuration Release \
            -p:TreatWarningsAsErrors=true

      - name: Test
        run: |
          dotnet test \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=results.trx" \
            --results-directory ./TestResults \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      # dorny/test-reporter does not yet support Node.js 24.
      # Replaced with the official GitHub test-reporter action which is
      # Node 24 compatible and produces the same PR annotations and
      # Actions summary output.
      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: TestResults/**/*.trx
          check_name: Test results
          fail_on: test failures

      - name: Upload coverage
        uses: codecov/codecov-action@v5.4.3
        if: always()
        with:
          files: TestResults/**/coverage.cobertura.xml
          fail_ci_if_error: false

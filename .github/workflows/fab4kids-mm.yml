# ════════════════════════════════════════════════════════════════════════════
# fab4kids-mm.yml
# Builds the fab4kids-mm React/Vite SPA and deploys to Azure Web App fab4kids-mm.
# ════════════════════════════════════════════════════════════════════════════

name: fab4kids-mm

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/fab4kids-mm/**'
      - '.github/workflows/fab4kids-mm.yml'
  workflow_dispatch:

concurrency:
  group: fab4kids-mm-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24.x'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/web/fab4kids-mm

    steps:

      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/fab4kids-mm/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: fab4kids-mm-dist
          path: apps/web/fab4kids-mm/dist
          retention-days: 7

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: fab4kids-mm-dist
          path: deploy

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F74BE3D54A774F6D9528FE0CDCED5FB4 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EDB5EC0904FA44F2A5C6D391165DA8BE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A2617AD60D1B4B0BABDD934C7142C0C7 }}

      - name: Configure startup command
        run: |
          RESOURCE_GROUP=$(az webapp list --query "[?name=='fab4kids-mm'].resourceGroup | [0]" -o tsv)
          if [ -z "$RESOURCE_GROUP" ]; then
            echo "Could not determine resource group for app 'fab4kids-mm'"
            exit 1
          fi
          az webapp config set \
            --name fab4kids-mm \
            --resource-group "$RESOURCE_GROUP" \
            --startup-file "pm2 serve /home/site/wwwroot --no-daemon --spa"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: fab4kids-mm
          slot-name: Production
          package: deploy

# ════════════════════════════════════════════════════════════════════════════
# fab4kids-mm.yml
# Builds the fab4kids-mm React/Vite SPA and deploys to Azure Web App fab4kids-mm.
# ════════════════════════════════════════════════════════════════════════════

name: fab4kids-mm

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/fab4kids-mm/**'
      - '.github/workflows/fab4kids-mm.yml'
  workflow_dispatch:

concurrency:
  group: fab4kids-mm-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.x'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/web/fab4kids-mm

    steps:

      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/fab4kids-mm/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Prepare deployment package
        run: |
          mkdir deploy
          cp -r dist deploy/
          printf '{"scripts":{"start":"serve -s dist -l 8080"},"dependencies":{"serve":"^14.2.1"}}' > deploy/package.json
          npm install --prefix deploy --omit=dev

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: fab4kids-mm-dist
          path: apps/web/fab4kids-mm/deploy
          retention-days: 7

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: fab4kids-mm-dist
          path: deploy

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: fab4kids-mm
          slot-name: Production
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_FAB4KIDS_MM }}
          package: deploy
